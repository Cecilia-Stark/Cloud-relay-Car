listen              1935;
max_connections     1000;
daemon              off;
srs_log_level       warn;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8088;
    dir             ./objs/nginx/html;
}

rtc_server {
    enabled         on;
    listen          8000;
    candidate       8.149.246.34;
}

vhost __defaultVhost__ {
    min_latency     on;
    tcp_nodelay     on;
    gop_cache       off;
    queue_length    0.5;

    publish {
        mr          off;
    }

    play {
        gop_cache   off;
        queue_length 0.5;
        mw_latency  0;
        mw_msgs     0;
    }

    rtc {
        enabled     on;
        nack        on;
        twcc        on;
        rtmp_to_rtc on;
        rtc_to_rtmp off;
    }

    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    hls {
        enabled     off;
    }

    dvr {
        enabled     off;
    }
}
